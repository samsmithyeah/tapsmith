name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  proto-lint:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1

      - name: Lint protobuf definitions
        run: buf lint proto/

      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: buf breaking proto/ --against '.git#ref=origin/main,subdir=proto'

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pilot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/pilot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run

      - name: Unused code check (knip)
        run: npm run knip

      - name: Build
        run: npm run build

  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pilot-core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/pilot-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/pilot-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

  rust-macos:
    # Compiles pilot-core on macOS so the macOS-gated iOS network capture
    # path (src/ios_redirect.rs, transparent-TCP MITM, vendored mitmproxy
    # IPC proto) is exercised by CI. The Linux rust job above can't catch
    # cfg(target_os = "macos") regressions on its own.
    name: Rust (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/pilot-core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/pilot-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/pilot-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            agent/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('agent/**/*.gradle.kts', 'agent/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Compile (assembleDebug)
        run: ./gradlew assembleDebug

      - name: Lint with ktlint
        run: ./gradlew ktlintCheck

  test-app:
    name: Test App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: test-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unused code check (knip)
        run: npm run knip
