name: E2E Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-android-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: "35"
  ANDROID_SYSTEM_IMAGE: "system-images;android-35;google_apis;x86_64"
  AVD_NAME: "Tapsmith_Generic_Phone_API_35"
  SHARD_TOTAL: 4

jobs:
  # ─── Build prerequisites (parallel) ────────────────────────────────────

  build-daemon:
    name: Build Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/tapsmith-core/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('packages/tapsmith-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-e2e-

      - name: Build release binary
        working-directory: packages/tapsmith-core
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: daemon-binary
          retention-days: 1
          path: packages/tapsmith-core/target/release/tapsmith-core

  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            agent/.gradle
          key: ${{ runner.os }}-gradle-agent-${{ hashFiles('agent/**/*.gradle.kts', 'agent/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-agent-

      - name: Build agent APKs
        working-directory: agent
        run: ./gradlew assembleDebug assembleDebugAndroidTest

      - uses: actions/upload-artifact@v4
        with:
          name: agent-apks
          retention-days: 1
          path: |
            agent/app/build/outputs/apk/debug/app-debug.apk
            agent/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

  build-test-app:
    name: Build Test App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache test app APK
        id: test-app-cache
        uses: actions/cache@v4
        with:
          path: test-app/android/app/build/outputs/apk/release/app-release.apk
          key: test-app-android-${{ hashFiles('test-app/app/**', 'test-app/assets/**', 'test-app/package-lock.json', 'test-app/app.json') }}

      - uses: actions/setup-node@v4
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        with:
          node-version: 24

      - uses: actions/setup-java@v4
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies and prebuild
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        working-directory: test-app
        run: |
          npm ci --legacy-peer-deps
          npx expo prebuild --platform android

      - name: Build release APK
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        working-directory: test-app/android
        run: ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: test-app-apk
          retention-days: 1
          path: test-app/android/app/build/outputs/apk/release/app-release.apk

  # ─── Sharded E2E execution ─────────────────────────────────────────────

  e2e-test:
    name: "Shard ${{ matrix.shard }}/4"
    needs: [build-daemon, build-agent, build-test-app]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android SDK environment
        run: |
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_AVD_HOME=$HOME/.config/.android/avd" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: daemon-binary
          path: packages/tapsmith-core/target/release

      - name: Download agent APKs
        uses: actions/download-artifact@v4
        with:
          name: agent-apks
          path: agent/app/build/outputs/apk

      - name: Download test app APK
        uses: actions/download-artifact@v4
        with:
          name: test-app-apk
          path: e2e/fixtures

      - name: Make daemon executable
        run: chmod +x packages/tapsmith-core/target/release/tapsmith-core

      - name: Cache Android system image
        id: system-image-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/system-images
          key: system-image-${{ env.ANDROID_SYSTEM_IMAGE }}-v1

      - name: Install Android system image
        if: steps.system-image-cache.outputs.cache-hit != 'true'
        run: echo "y" | sdkmanager --install "${{ env.ANDROID_SYSTEM_IMAGE }}"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            -n "${{ env.AVD_NAME }}" \
            -k "${{ env.ANDROID_SYSTEM_IMAGE }}" \
            --device "pixel_6" \
            --force

      - name: Install SDK dependencies
        working-directory: packages/tapsmith
        run: npm ci

      - name: Build SDK
        working-directory: packages/tapsmith
        run: npm run build

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Run E2E tests (retry once on infra failure)
        working-directory: e2e
        run: |
          npx tapsmith test -c tapsmith.config.android.mjs --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }} --workers 1 || \
          (echo "First attempt failed — killing stale emulators before retry" && \
           adb emu kill 2>/dev/null; sleep 2; \
           npx tapsmith test -c tapsmith.config.android.mjs --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }} --workers 1)

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          retention-days: 7
          path: e2e/blob-report/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shard }}
          retention-days: 7
          path: |
            e2e/tapsmith-results/
            !e2e/tapsmith-results/**/*.tar.gz

  # ─── Merge shard reports ───────────────────────────────────────────────

  e2e-report:
    name: Merge Reports
    needs: [e2e-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/tapsmith/package-lock.json

      - name: Install and build SDK
        working-directory: packages/tapsmith
        run: npm ci && npm run build

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Merge reports
        working-directory: e2e
        run: npx tapsmith merge-reports ../all-blob-reports -c tapsmith.config.android.mjs

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          retention-days: 30
          path: e2e/tapsmith-report/
