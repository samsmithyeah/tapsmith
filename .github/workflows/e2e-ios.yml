name: E2E iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-ios-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  SHARD_TOTAL: 4

jobs:
  # ─── Build prerequisites (parallel) ────────────────────────────────────

  build-daemon:
    name: Build Daemon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/tapsmith-core/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('packages/tapsmith-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-e2e-

      - name: Build release binary
        working-directory: packages/tapsmith-core
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: daemon-binary-macos
          retention-days: 1
          path: packages/tapsmith-core/target/release/tapsmith-core

  build-agent:
    name: Build Agent
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Generate Xcode project
        working-directory: ios-agent
        run: |
          brew install xcodegen 2>/dev/null || true
          ./create-xcode-project.sh

      - name: Build for testing
        working-directory: ios-agent
        run: |
          xcodebuild build-for-testing \
            -project TapsmithAgent.xcodeproj \
            -scheme TapsmithAgentUITests \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build-sim \
            -quiet

      - uses: actions/upload-artifact@v4
        with:
          name: ios-agent-build
          retention-days: 1
          include-hidden-files: true
          path: ios-agent/.build-sim/

  build-test-app:
    name: Build Test App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache test app
        id: test-app-cache
        uses: actions/cache@v4
        with:
          path: e2e/fixtures/TapsmithTestApp.app
          key: test-app-ios-${{ hashFiles('test-app/app/**', 'test-app/assets/**', 'test-app/package-lock.json', 'test-app/app.json') }}

      - uses: actions/setup-node@v4
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        with:
          node-version: 24

      - name: Install dependencies and prebuild
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        working-directory: test-app
        run: |
          npm ci --legacy-peer-deps
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        working-directory: test-app/ios
        run: pod install

      - name: Build for iOS Simulator
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        working-directory: test-app/ios
        run: |
          xcodebuild build \
            -workspace TapsmithTestApp.xcworkspace \
            -scheme TapsmithTestApp \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ../.build \
            -quiet

      - name: Copy to fixtures path
        if: steps.test-app-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p e2e/fixtures
          cp -R test-app/.build/Build/Products/Release-iphonesimulator/TapsmithTestApp.app e2e/fixtures/

      - name: Package test app
        run: tar czf test-app-ios.tar.gz -C e2e/fixtures TapsmithTestApp.app

      - uses: actions/upload-artifact@v4
        with:
          name: test-app-ios
          retention-days: 1
          path: test-app-ios.tar.gz

  # ─── Sharded E2E execution ─────────────────────────────────────────────

  e2e-test:
    name: "Shard ${{ matrix.shard }}/4"
    needs: [build-daemon, build-agent, build-test-app]
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: daemon-binary-macos
          path: packages/tapsmith-core/target/release

      - name: Download iOS agent
        uses: actions/download-artifact@v4
        with:
          name: ios-agent-build
          path: ios-agent/.build-sim

      - name: Download test app
        uses: actions/download-artifact@v4
        with:
          name: test-app-ios
          path: .

      - name: Make daemon executable
        run: |
          chmod +x packages/tapsmith-core/target/release/tapsmith-core
          xattr -d com.apple.quarantine packages/tapsmith-core/target/release/tapsmith-core 2>/dev/null || true

      - name: Select Xcode and boot simulator
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          SIM=$(xcrun simctl list devices available | grep -oE "iPhone [0-9]+ " | head -1 | xargs)
          echo "Using simulator: $SIM"
          echo "TAPSMITH_IOS_SIMULATOR=$SIM" >> $GITHUB_ENV
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for devs in d['devices'].values():
            for dev in devs:
              if dev['name']=='$SIM' and dev['isAvailable']:
                print(dev['udid']); sys.exit()
          ")
          if [ -n "$UDID" ]; then
            echo "Booting $SIM ($UDID)"
            xcrun simctl boot "$UDID" 2>/dev/null || true
          fi

      - name: Link agent build to DerivedData for auto-discovery
        run: |
          mkdir -p ~/Library/Developer/Xcode/DerivedData
          ln -s "$PWD/ios-agent/.build-sim" ~/Library/Developer/Xcode/DerivedData/TapsmithAgent-ci

      - name: Extract test app
        run: |
          mkdir -p e2e/fixtures
          tar xzf test-app-ios.tar.gz -C e2e/fixtures

      - name: Install SDK dependencies
        working-directory: packages/tapsmith
        run: npm ci

      - name: Build SDK
        working-directory: packages/tapsmith
        run: npm run build

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Run E2E tests (retry once on infra failure)
        working-directory: e2e
        run: |
          npx tapsmith test -c tapsmith.config.ios-ci.mjs --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }} --workers 1 || \
          (echo "First attempt failed — killing stale simulators before retry" && \
           xcrun simctl shutdown all 2>/dev/null; \
           npx tapsmith test -c tapsmith.config.ios-ci.mjs --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }} --workers 1)

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-ios-${{ matrix.shard }}
          retention-days: 7
          path: e2e/blob-report/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ios-${{ matrix.shard }}
          retention-days: 7
          path: |
            e2e/tapsmith-results/
            !e2e/tapsmith-results/**/*.tar.gz

  # ─── Merge shard reports ───────────────────────────────────────────────

  e2e-report:
    name: Merge Reports
    needs: [e2e-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/tapsmith/package-lock.json

      - name: Install and build SDK
        working-directory: packages/tapsmith
        run: npm ci && npm run build

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-ios-*
          path: all-blob-reports
          merge-multiple: true

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Merge reports
        working-directory: e2e
        run: npx tapsmith merge-reports ../all-blob-reports -c tapsmith.config.ios-ci.mjs

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ios-report
          retention-days: 30
          path: e2e/tapsmith-report/
