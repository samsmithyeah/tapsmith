syntax = "proto3";

package pilot;

// ─── Service: TypeScript SDK ↔ Rust Daemon ───

service PilotService {
  rpc FindElement(FindElementRequest) returns (FindElementResponse);
  rpc FindElements(FindElementsRequest) returns (FindElementsResponse);
  rpc Tap(TapRequest) returns (ActionResponse);
  rpc LongPress(LongPressRequest) returns (ActionResponse);
  rpc TypeText(TypeTextRequest) returns (ActionResponse);
  rpc ClearText(ClearTextRequest) returns (ActionResponse);
  rpc ClearAndType(ClearAndTypeRequest) returns (ActionResponse);
  rpc Swipe(SwipeRequest) returns (ActionResponse);
  rpc Scroll(ScrollRequest) returns (ActionResponse);
  rpc PressKey(PressKeyRequest) returns (ActionResponse);
  rpc TakeScreenshot(ScreenshotRequest) returns (ScreenshotResponse);
  rpc GetUiHierarchy(UiHierarchyRequest) returns (UiHierarchyResponse);
  rpc WaitForIdle(WaitForIdleRequest) returns (ActionResponse);
  rpc InstallApk(InstallApkRequest) returns (ActionResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc SetDevice(SetDeviceRequest) returns (ActionResponse);
  rpc StartAgent(StartAgentRequest) returns (ActionResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}

// ─── Common Types ───

message Selector {
  oneof selector {
    RoleSelector role = 1;
    string text = 2;
    string text_contains = 3;
    string content_desc = 4;
    string hint = 5;
    string class_name = 6;
    string test_id = 7;
    string resource_id = 8;
    string xpath = 9;
  }
  Selector parent = 10;
}

message RoleSelector {
  string role = 1;
  string name = 2;
}

message ElementInfo {
  string element_id = 1;
  string class_name = 2;
  string text = 3;
  string content_description = 4;
  string resource_id = 5;
  bool enabled = 6;
  bool visible = 7;
  bool clickable = 8;
  bool focusable = 9;
  bool scrollable = 10;
  Bounds bounds = 11;
  string hint = 12;
  bool checked = 13;
  bool selected = 14;
  bool focused = 15;
  string role = 16;
  float viewport_ratio = 17;
}

message Bounds {
  int32 left = 1;
  int32 top = 2;
  int32 right = 3;
  int32 bottom = 4;
}

message ActionResponse {
  string request_id = 1;
  bool success = 2;
  string error_type = 3;
  string error_message = 4;
  bytes screenshot = 5;
}

// ─── Requests ───

message FindElementRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message FindElementResponse {
  string request_id = 1;
  bool found = 2;
  ElementInfo element = 3;
  string error_message = 4;
}

message FindElementsRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message FindElementsResponse {
  string request_id = 1;
  repeated ElementInfo elements = 2;
  string error_message = 3;
}

message TapRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message LongPressRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 duration_ms = 3;
  uint64 timeout_ms = 4;
}

message TypeTextRequest {
  string request_id = 1;
  Selector selector = 2;
  string text = 3;
  uint64 timeout_ms = 4;
}

message ClearTextRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message ClearAndTypeRequest {
  string request_id = 1;
  Selector selector = 2;
  string text = 3;
  uint64 timeout_ms = 4;
}

message SwipeRequest {
  string request_id = 1;
  string direction = 2;
  Selector start_element = 3;
  float speed = 4;
  float distance = 5;
  uint64 timeout_ms = 6;
}

message ScrollRequest {
  string request_id = 1;
  Selector container = 2;
  string direction = 3;
  Selector scroll_until_visible = 4;
  float distance = 5;
  uint64 timeout_ms = 6;
}

message PressKeyRequest {
  string request_id = 1;
  string key = 2;
}

message ScreenshotRequest {
  string request_id = 1;
}

message ScreenshotResponse {
  string request_id = 1;
  bool success = 2;
  bytes data = 3;
  string error_message = 4;
}

message UiHierarchyRequest {
  string request_id = 1;
}

message UiHierarchyResponse {
  string request_id = 1;
  string hierarchy_xml = 2;
  string error_message = 3;
}

message WaitForIdleRequest {
  string request_id = 1;
  uint64 timeout_ms = 2;
}

message InstallApkRequest {
  string request_id = 1;
  string apk_path = 2;
}

message ListDevicesRequest {
  string request_id = 1;
}

message DeviceInfo {
  string serial = 1;
  string model = 2;
  string state = 3;
  bool is_emulator = 4;
}

message ListDevicesResponse {
  string request_id = 1;
  repeated DeviceInfo devices = 2;
}

message SetDeviceRequest {
  string request_id = 1;
  string serial = 2;
}

message StartAgentRequest {
  string request_id = 1;
  string target_package = 2;
}

message PingRequest {}

message PingResponse {
  string version = 1;
  bool agent_connected = 2;
}
