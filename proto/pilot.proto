syntax = "proto3";

package pilot;

// ─── Service: TypeScript SDK ↔ Rust Daemon ───

service PilotService {
  rpc FindElement(FindElementRequest) returns (FindElementResponse);
  rpc FindElements(FindElementsRequest) returns (FindElementsResponse);
  rpc Tap(TapRequest) returns (ActionResponse);
  rpc LongPress(LongPressRequest) returns (ActionResponse);
  rpc TypeText(TypeTextRequest) returns (ActionResponse);
  rpc ClearText(ClearTextRequest) returns (ActionResponse);
  rpc ClearAndType(ClearAndTypeRequest) returns (ActionResponse);
  rpc Swipe(SwipeRequest) returns (ActionResponse);
  rpc Scroll(ScrollRequest) returns (ActionResponse);
  rpc PressKey(PressKeyRequest) returns (ActionResponse);
  rpc TakeScreenshot(ScreenshotRequest) returns (ScreenshotResponse);
  rpc GetUiHierarchy(UiHierarchyRequest) returns (UiHierarchyResponse);
  rpc WaitForIdle(WaitForIdleRequest) returns (ActionResponse);
  rpc InstallApk(InstallApkRequest) returns (ActionResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc SetDevice(SetDeviceRequest) returns (ActionResponse);
  rpc StartAgent(StartAgentRequest) returns (ActionResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc DoubleTap(DoubleTapRequest) returns (ActionResponse);
  rpc DragAndDrop(DragAndDropRequest) returns (ActionResponse);
  rpc SelectOption(SelectOptionRequest) returns (ActionResponse);
  rpc PinchZoom(PinchZoomRequest) returns (ActionResponse);
  rpc Focus(FocusRequest) returns (ActionResponse);
  rpc Blur(BlurRequest) returns (ActionResponse);
  rpc Highlight(HighlightRequest) returns (ActionResponse);
  rpc TakeElementScreenshot(TakeElementScreenshotRequest) returns (ScreenshotResponse);

  // ─── Device Management (PILOT-10) ───
  rpc LaunchApp(LaunchAppRequest) returns (ActionResponse);
  rpc OpenDeepLink(OpenDeepLinkRequest) returns (ActionResponse);
  rpc GetCurrentPackage(GetCurrentPackageRequest) returns (GetCurrentPackageResponse);
  rpc GetCurrentActivity(GetCurrentActivityRequest) returns (GetCurrentActivityResponse);
  rpc TerminateApp(TerminateAppRequest) returns (ActionResponse);
  rpc GetAppState(GetAppStateRequest) returns (GetAppStateResponse);
  rpc ClearAppData(ClearAppDataRequest) returns (ActionResponse);
  rpc GrantPermission(GrantPermissionRequest) returns (ActionResponse);
  rpc RevokePermission(RevokePermissionRequest) returns (ActionResponse);
  rpc SetClipboard(SetClipboardRequest) returns (ActionResponse);
  rpc GetClipboard(GetClipboardRequest) returns (GetClipboardResponse);
  rpc SetOrientation(SetOrientationRequest) returns (ActionResponse);
  rpc GetOrientation(GetOrientationRequest) returns (GetOrientationResponse);
  rpc IsKeyboardShown(IsKeyboardShownRequest) returns (IsKeyboardShownResponse);
  rpc HideKeyboard(HideKeyboardRequest) returns (ActionResponse);
  rpc OpenNotifications(OpenNotificationsRequest) returns (ActionResponse);
  rpc OpenQuickSettings(OpenQuickSettingsRequest) returns (ActionResponse);
  rpc SetColorScheme(SetColorSchemeRequest) returns (ActionResponse);
  rpc GetColorScheme(GetColorSchemeRequest) returns (GetColorSchemeResponse);
  rpc WakeDevice(WakeDeviceRequest) returns (ActionResponse);
  rpc UnlockDevice(UnlockDeviceRequest) returns (ActionResponse);
  rpc RestartApp(RestartAppRequest) returns (ActionResponse);

  // ─── App State Snapshot (PILOT-115) ───
  rpc SaveAppState(SaveAppStateRequest) returns (ActionResponse);
  rpc RestoreAppState(RestoreAppStateRequest) returns (ActionResponse);

  // ─── Trace Support (PILOT-85) ───
  rpc GetLogcat(GetLogcatRequest) returns (GetLogcatResponse);

  // ─── Network Capture (PILOT-164) ───
  rpc StartNetworkCapture(StartNetworkCaptureRequest) returns (StartNetworkCaptureResponse);
  rpc StopNetworkCapture(StopNetworkCaptureRequest) returns (StopNetworkCaptureResponse);
}

// ─── Common Types ───

message Selector {
  oneof selector {
    RoleSelector role = 1;
    string text = 2;
    string text_contains = 3;
    string content_desc = 4;
    string hint = 5;
    string class_name = 6;
    string test_id = 7;
    string resource_id = 8;
    string xpath = 9;
  }
  Selector parent = 10;
}

message RoleSelector {
  string role = 1;
  string name = 2;
}

message ElementInfo {
  string element_id = 1;
  string class_name = 2;
  string text = 3;
  string content_description = 4;
  string resource_id = 5;
  bool enabled = 6;
  bool visible = 7;
  bool clickable = 8;
  bool focusable = 9;
  bool scrollable = 10;
  Bounds bounds = 11;
  string hint = 12;
  bool checked = 13;
  bool selected = 14;
  bool focused = 15;
  string role = 16;
  float viewport_ratio = 17;
}

message Bounds {
  int32 left = 1;
  int32 top = 2;
  int32 right = 3;
  int32 bottom = 4;
}

message ActionResponse {
  string request_id = 1;
  bool success = 2;
  string error_type = 3;
  string error_message = 4;
  bytes screenshot = 5;
}

// ─── Requests ───

message FindElementRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message FindElementResponse {
  string request_id = 1;
  bool found = 2;
  ElementInfo element = 3;
  string error_message = 4;
}

message FindElementsRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message FindElementsResponse {
  string request_id = 1;
  repeated ElementInfo elements = 2;
  string error_message = 3;
}

message TapRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message LongPressRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 duration_ms = 3;
  uint64 timeout_ms = 4;
}

message TypeTextRequest {
  string request_id = 1;
  Selector selector = 2;
  string text = 3;
  uint64 timeout_ms = 4;
}

message ClearTextRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message ClearAndTypeRequest {
  string request_id = 1;
  Selector selector = 2;
  string text = 3;
  uint64 timeout_ms = 4;
}

message SwipeRequest {
  string request_id = 1;
  string direction = 2;
  Selector start_element = 3;
  float speed = 4;
  float distance = 5;
  uint64 timeout_ms = 6;
}

message ScrollRequest {
  string request_id = 1;
  Selector container = 2;
  string direction = 3;
  Selector scroll_until_visible = 4;
  float distance = 5;
  uint64 timeout_ms = 6;
}

message PressKeyRequest {
  string request_id = 1;
  string key = 2;
}

message ScreenshotRequest {
  string request_id = 1;
}

message ScreenshotResponse {
  string request_id = 1;
  bool success = 2;
  bytes data = 3;
  string error_message = 4;
}

message UiHierarchyRequest {
  string request_id = 1;
}

message UiHierarchyResponse {
  string request_id = 1;
  string hierarchy_xml = 2;
  string error_message = 3;
}

message WaitForIdleRequest {
  string request_id = 1;
  uint64 timeout_ms = 2;
}

message InstallApkRequest {
  string request_id = 1;
  string apk_path = 2;
}

message ListDevicesRequest {
  string request_id = 1;
}

message DeviceInfo {
  string serial = 1;
  string model = 2;
  string state = 3;
  bool is_emulator = 4;
  string platform = 5;  // "android" or "ios"
}

message ListDevicesResponse {
  string request_id = 1;
  repeated DeviceInfo devices = 2;
}

message SetDeviceRequest {
  string request_id = 1;
  string serial = 2;
}

message StartAgentRequest {
  string request_id = 1;
  string target_package = 2;
  string agent_apk_path = 3;       // host path to agent APK (auto-install, Android)
  string agent_test_apk_path = 4;  // host path to agent test APK (auto-install, Android)
  string ios_xctestrun_path = 5;   // host path to .xctestrun file (iOS)
}

message PingRequest {}

message PingResponse {
  string version = 1;
  bool agent_connected = 2;
}

// ─── Element Actions (PILOT-2) ───

message DoubleTapRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message DragAndDropRequest {
  string request_id = 1;
  Selector source_selector = 2;
  Selector target_selector = 3;
  uint64 timeout_ms = 4;
}

message SelectOptionRequest {
  string request_id = 1;
  Selector selector = 2;
  oneof selection {
    string option = 3;
    int32 index = 4;
  }
  uint64 timeout_ms = 5;
}

message PinchZoomRequest {
  string request_id = 1;
  Selector selector = 2;
  float scale = 3;
  uint64 timeout_ms = 4;
}

message FocusRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message BlurRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message HighlightRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 duration_ms = 3;
  uint64 timeout_ms = 4;
}

message TakeElementScreenshotRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

// ─── Device Management (PILOT-10) ───

message LaunchAppRequest {
  string request_id = 1;
  string package_name = 2;
  string activity = 3;       // optional: specific activity to launch
  bool clear_data = 4;       // clear app data before launch
  bool wait_for_idle = 5;    // wait for UI to settle after launch
  uint64 idle_timeout_ms = 6; // timeout for waitForIdle (0 = use default 10s)
}

message OpenDeepLinkRequest {
  string request_id = 1;
  string uri = 2;
}

message GetCurrentPackageRequest {
  string request_id = 1;
}

message GetCurrentPackageResponse {
  string request_id = 1;
  string package_name = 2;
}

message GetCurrentActivityRequest {
  string request_id = 1;
}

message GetCurrentActivityResponse {
  string request_id = 1;
  string activity = 2;
}

message TerminateAppRequest {
  string request_id = 1;
  string package_name = 2;
}

message GetAppStateRequest {
  string request_id = 1;
  string package_name = 2;
}

message GetAppStateResponse {
  string request_id = 1;
  string state = 2;  // "not_installed" | "stopped" | "background" | "foreground"
}

message ClearAppDataRequest {
  string request_id = 1;
  string package_name = 2;
}

message GrantPermissionRequest {
  string request_id = 1;
  string package_name = 2;
  string permission = 3;
}

message RevokePermissionRequest {
  string request_id = 1;
  string package_name = 2;
  string permission = 3;
}

message SetClipboardRequest {
  string request_id = 1;
  string text = 2;
}

message GetClipboardRequest {
  string request_id = 1;
}

message GetClipboardResponse {
  string request_id = 1;
  string text = 2;
}

message SetOrientationRequest {
  string request_id = 1;
  string orientation = 2;  // "portrait" | "landscape"
}

message GetOrientationRequest {
  string request_id = 1;
}

message GetOrientationResponse {
  string request_id = 1;
  string orientation = 2;
}

message IsKeyboardShownRequest {
  string request_id = 1;
}

message IsKeyboardShownResponse {
  string request_id = 1;
  bool shown = 2;
}

message HideKeyboardRequest {
  string request_id = 1;
}

message OpenNotificationsRequest {
  string request_id = 1;
}

message OpenQuickSettingsRequest {
  string request_id = 1;
}

message SetColorSchemeRequest {
  string request_id = 1;
  string scheme = 2;  // "dark" | "light"
}

message GetColorSchemeRequest {
  string request_id = 1;
}

message GetColorSchemeResponse {
  string request_id = 1;
  string scheme = 2;
}

message WakeDeviceRequest {
  string request_id = 1;
}

message UnlockDeviceRequest {
  string request_id = 1;
}

message RestartAppRequest {
  string request_id = 1;
  string package_name = 2;
  bool wait_for_idle = 3;
  uint64 idle_timeout_ms = 4; // timeout for waitForIdle (0 = use default 10s)
}

// ─── App State Snapshot (PILOT-115) ───

message SaveAppStateRequest {
  string request_id = 1;
  string package_name = 2;
  string path = 3;             // local filesystem path to save the archive to
}

message RestoreAppStateRequest {
  string request_id = 1;
  string package_name = 2;
  string path = 3;             // local filesystem path of the archive to restore
}

// ─── Trace Support (PILOT-85) ───

message GetLogcatRequest {
  string request_id = 1;
  string package_name = 2;   // filter by app package (resolved to PID)
  uint64 since_ms = 3;       // only return entries after this epoch timestamp
  uint64 until_ms = 4;       // only return entries before this timestamp (0 = now)
}

message GetLogcatResponse {
  string request_id = 1;
  string logcat = 2;         // raw logcat output
  string error_message = 3;
}

// ─── Network Capture (PILOT-164) ───

message StartNetworkCaptureRequest {
  string request_id = 1;
}

message StartNetworkCaptureResponse {
  string request_id = 1;
  bool success = 2;
  uint32 proxy_port = 3;     // port the proxy is listening on
  string error_message = 4;
}

message StopNetworkCaptureRequest {
  string request_id = 1;
}

message CapturedNetworkEntry {
  string method = 1;
  string url = 2;
  int32 status_code = 3;
  string content_type = 4;
  uint64 request_size = 5;
  uint64 response_size = 6;
  uint64 start_time_ms = 7;  // epoch ms
  uint64 duration_ms = 8;
  string request_headers_json = 9;   // JSON-encoded headers
  string response_headers_json = 10;
  bytes request_body = 11;
  bytes response_body = 12;
  bool is_https = 13;
}

message StopNetworkCaptureResponse {
  string request_id = 1;
  bool success = 2;
  repeated CapturedNetworkEntry entries = 3;
  string error_message = 4;
}
