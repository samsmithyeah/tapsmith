message FocusRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message BlurRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

message HighlightRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 duration_ms = 3;
  uint64 timeout_ms = 4;
}

message TakeElementScreenshotRequest {
  string request_id = 1;
  Selector selector = 2;
  uint64 timeout_ms = 3;
}

// ─── Device Management (PILOT-10) ───

message LaunchAppRequest {
  string request_id = 1;
  string package_name = 2;
  string activity = 3;       // optional: specific activity to launch
  bool clear_data = 4;       // clear app data before launch
  bool wait_for_idle = 5;    // wait for UI to settle after launch
  uint64 idle_timeout_ms = 6; // timeout for waitForIdle (0 = use default 10s)
}

message OpenDeepLinkRequest {
  string request_id = 1;
  string uri = 2;
}

message GetCurrentPackageRequest {
  string request_id = 1;
}

message GetCurrentPackageResponse {
  string request_id = 1;
  string package_name = 2;
}

message GetCurrentActivityRequest {
  string request_id = 1;
}

message GetCurrentActivityResponse {
  string request_id = 1;
  string activity = 2;
}

message TerminateAppRequest {
  string request_id = 1;
  string package_name = 2;
}

message GetAppStateRequest {
  string request_id = 1;
  string package_name = 2;
}

message GetAppStateResponse {
  string request_id = 1;
  string state = 2;  // "not_installed" | "stopped" | "background" | "foreground"
}

message ClearAppDataRequest {
  string request_id = 1;
  string package_name = 2;
}

message GrantPermissionRequest {
  string request_id = 1;
  string package_name = 2;
  string permission = 3;
}

message RevokePermissionRequest {
  string request_id = 1;
  string package_name = 2;
  string permission = 3;
}

message SetClipboardRequest {
  string request_id = 1;
  string text = 2;
}

message GetClipboardRequest {
  string request_id = 1;
}

message GetClipboardResponse {
  string request_id = 1;
  string text = 2;
}

message SetOrientationRequest {
  string request_id = 1;
  string orientation = 2;  // "portrait" | "landscape"
}

message GetOrientationRequest {
  string request_id = 1;
}

message GetOrientationResponse {
  string request_id = 1;
  string orientation = 2;
}

message IsKeyboardShownRequest {
  string request_id = 1;
}

message IsKeyboardShownResponse {
  string request_id = 1;
  bool shown = 2;
}

message HideKeyboardRequest {
  string request_id = 1;
}

message OpenNotificationsRequest {
  string request_id = 1;
}

message OpenQuickSettingsRequest {
  string request_id = 1;
}

message SetColorSchemeRequest {
  string request_id = 1;
  string scheme = 2;  // "dark" | "light"
}

message GetColorSchemeRequest {
  string request_id = 1;
}

message GetColorSchemeResponse {
  string request_id = 1;
  string scheme = 2;
}

message WakeDeviceRequest {
  string request_id = 1;
}

message UnlockDeviceRequest {
  string request_id = 1;
}

message RestartAppRequest {
  string request_id = 1;
  string package_name = 2;
  bool wait_for_idle = 3;
  uint64 idle_timeout_ms = 4; // timeout for waitForIdle (0 = use default 10s)
}

// ─── App State Snapshot (PILOT-115) ───

message SaveAppStateRequest {
  string request_id = 1;
  string package_name = 2;
  string path = 3;             // local filesystem path to save the archive to
}

message RestoreAppStateRequest {
  string request_id = 1;
  string package_name = 2;
  string path = 3;             // local filesystem path of the archive to restore
}

// ─── Trace Support (PILOT-85) ───

message GetLogcatRequest {
  string request_id = 1;
  string package_name = 2;   // filter by app package (resolved to PID)
  uint64 since_ms = 3;       // only return entries after this epoch timestamp
  uint64 until_ms = 4;       // only return entries before this timestamp (0 = now)
}

message GetLogcatResponse {
  string request_id = 1;
  string logcat = 2;         // raw logcat output
  string error_message = 3;
}

// ─── Network Capture (PILOT-164) ───

message StartNetworkCaptureRequest {
  string request_id = 1;
}

message StartNetworkCaptureResponse {
  string request_id = 1;
  bool success = 2;
  uint32 proxy_port = 3;     // port the proxy is listening on
  string error_message = 4;
}

message StopNetworkCaptureRequest {
  string request_id = 1;
}

message CapturedNetworkEntry {
  string method = 1;
  string url = 2;
  int32 status_code = 3;
  string content_type = 4;
  uint64 request_size = 5;
  uint64 response_size = 6;
  uint64 start_time_ms = 7;  // epoch ms
  uint64 duration_ms = 8;
  string request_headers_json = 9;   // JSON-encoded headers
  string response_headers_json = 10;
  bytes request_body = 11;
  bytes response_body = 12;
  bool is_https = 13;
  // How this request was handled by a route: "mocked", "aborted",
  // "continued", "fetched", or "" (no route matched / passthrough).
  string route_action = 14;
}

message StopNetworkCaptureResponse {
  string request_id = 1;
  bool success = 2;
  repeated CapturedNetworkEntry entries = 3;
  string error_message = 4;
}

// ─── Physical iOS device network capture (PILOT-185) ───

message GenerateIosNetworkProfileRequest {
  string request_id = 1;
  // Target device UDID. Must match a physical device returned by ListDevices.
  string udid = 2;
  // Optional Wi-Fi SSID to include in the mobileconfig. Empty = auto-detect
  // the host's current Wi-Fi network.
  string ssid = 3;
  // Optional human-readable name for the device (used in PayloadDisplayName).
  // Defaults to the device's name from devicectl if empty.
  string device_name = 4;
}

message GenerateIosNetworkProfileResponse {
  string request_id = 1;
  bool success = 2;
  string error_message = 3;
  // Absolute path to the generated .mobileconfig file.
  string profile_path = 4;
  // Host IP the profile points at.
  string host_ip = 5;
  // Deterministic TCP port assigned for this UDID.
  uint32 port = 6;
  // SSID captured in the profile.
  string ssid = 7;
}

// ─── Network Route Interception ───

// Envelope for client → daemon messages on the NetworkRoute stream.
message NetworkRouteClientMessage {
  oneof msg {
    RegisterRouteRequest register_route = 1;
    UnregisterRouteRequest unregister_route = 2;
    RouteDecision route_decision = 3;
    SubscribeNetworkEvents subscribe_events = 4;
    UnsubscribeNetworkEvents unsubscribe_events = 5;
  }
}

// Envelope for daemon → client messages on the NetworkRoute stream.
message NetworkRouteServerMessage {
  oneof msg {
    RegisterRouteResponse register_route_response = 1;
    InterceptedRequest intercepted_request = 2;
    UnregisterRouteResponse unregister_route_response = 3;
    FetchedResponse fetched_response = 4;
    NetworkRequestEvent request_event = 5;
    NetworkResponseEvent response_event = 6;
  }
}

// ─── Route Registration ───

message RegisterRouteRequest {
  // Client-generated UUID identifying this route.
  string route_id = 1;
  // URL glob pattern (Playwright semantics: * matches except /, ** matches all).
  string url_pattern = 2;
}

message RegisterRouteResponse {
  string route_id = 1;
  bool success = 2;
  string error_message = 3;
}

message UnregisterRouteRequest {
  string route_id = 1;
}

message UnregisterRouteResponse {
  string route_id = 1;
  bool success = 2;
}

// ─── Interception ───

// Sent by the daemon when a request matches a registered route.
// The proxy pauses the request until a RouteDecision arrives.
message InterceptedRequest {
  // Unique ID for this interception (maps RouteDecision back to the request).
  string intercept_id = 1;
  // Which registered route matched.
  string route_id = 2;
  string method = 3;
  string url = 4;
  repeated HeaderEntry headers = 5;
  bytes body = 6;
  bool is_https = 7;
}

// SDK → daemon: what to do with an intercepted request.
message RouteDecision {
  string intercept_id = 1;
  oneof action {
    RouteAbort abort = 2;
    RouteContinue continue_request = 3;
    RouteFulfill fulfill = 4;
    RouteFetch fetch = 5;
    // Used after a RouteFetch: the daemon sent a FetchedResponse, and the
    // SDK now provides the final (possibly modified) response to return.
    RouteFulfill fulfill_after_fetch = 6;
  }
}

message RouteAbort {
  // Error reason: "connectionrefused", "connectionreset", "timedout", etc.
  // Empty string = generic connection reset.
  string error_code = 1;
}

message RouteContinue {
  // Override fields. Empty/zero = keep original value.
  string url = 1;
  string method = 2;
  repeated HeaderEntry headers = 3;
  bytes post_data = 4;
}

message RouteFulfill {
  int32 status = 1;                  // HTTP status code (default 200)
  repeated HeaderEntry headers = 2;
  bytes body = 3;
  string content_type = 4;
}

message RouteFetch {
  // Override fields for the upstream request. Empty = keep original.
  string url = 1;
  string method = 2;
  repeated HeaderEntry headers = 3;
  bytes post_data = 4;
}

// Daemon → SDK: the real upstream response (sent after RouteFetch).
// The SDK inspects/modifies this and sends a RouteDecision.fulfill_after_fetch.
message FetchedResponse {
  string intercept_id = 1;
  int32 status = 2;
  repeated HeaderEntry headers = 3;
  bytes body = 4;
}

// Shared key-value pair for HTTP headers.
message HeaderEntry {
  string name = 1;
  string value = 2;
}

// ─── Network Events (non-blocking notifications) ───

// Subscribe to request/response events for all proxied traffic.
// Events are informational only — they do not block requests.
message SubscribeNetworkEvents {}

message UnsubscribeNetworkEvents {}

// Fired when a request is sent upstream (or fulfilled by a route).
message NetworkRequestEvent {
  string method = 1;
  string url = 2;
  repeated HeaderEntry headers = 3;
  bytes body = 4;
  bool is_https = 5;
  // Non-empty if this request was intercepted by a route.
  string route_action = 6;
}

// Fired when a response is received from upstream (or synthesized by a route).
message NetworkResponseEvent {
  string method = 1;
  string url = 2;
  int32 status = 3;
  repeated HeaderEntry headers = 4;
  bytes body = 5;
  string route_action = 6;
}
