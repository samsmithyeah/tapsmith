[package]
name = "pilot-core"
version = "0.1.0"
edition = "2021"
description = "Pilot mobile testing framework - core daemon"

[[bin]]
name = "pilot-core"
path = "src/main.rs"

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"

[build-dependencies]
tonic-build = "0.12"
